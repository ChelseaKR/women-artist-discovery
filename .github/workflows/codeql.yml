name: codeql

# SEC-08 / CICD-20: static analysis over both the Python source and the
# workflow files themselves. Weekly (catches newly-published query packs
# against unchanged code) plus every PR/push to main. Results are NOT uploaded
# to the Security tab — code scanning/GHAS isn't purchasable for a private repo
# on this account tier, so `upload: never` + the "Fail on findings" step below
# gate directly on the SARIF output instead of relying on the code-scanning UI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"  # weekly, offset off the hour
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "actions"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        id: analyze
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
          upload: never

      - name: Fail on findings (no code-scanning tab on this private repo)
        run: |
          set -euo pipefail
          count=$(jq -s '[.[].runs[].results[]] | length' "${{ steps.analyze.outputs.sarif-output }}"/*.sarif)
          echo "CodeQL findings (${{ matrix.language }}): $count"
          if [ "$count" -gt 0 ]; then
            jq -s '[.[].runs[].results[]][] | {ruleId, message: .message.text, locations: [.locations[].physicalLocation.artifactLocation.uri]}' "${{ steps.analyze.outputs.sarif-output }}"/*.sarif
            exit 1
          fi
