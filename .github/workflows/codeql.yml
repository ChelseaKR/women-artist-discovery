name: codeql

# SEC-08 / CICD-20: static analysis over both the Python source and the
# workflow files themselves. Weekly (catches newly-published query packs
# against unchanged code) plus manual dispatch. Results stay in-run because
# code scanning is not enabled for this private repo.

on:
  workflow_dispatch: {}
  pull_request:
    branches: [main]  # CI-CD-STANDARD §11e: PRs into main + weekly schedule
  schedule:
    - cron: '17 4 * * 6' # weekly — re-armed 2026-07-11 (metrics plan Phase 0.2)

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        language: ["python", "actions"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          languages: ${{ matrix.language }}

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
          # No GHAS code scanning on this private repo — findings are checked in-run below.
          upload: never
          output: codeql-results

      - name: Fail on findings (no GHAS on this private repo; SARIF checked in-run)
        shell: bash
        run: |
          count=$(jq -s '[.[] | .runs[]?.results[]?] | length' codeql-results/*.sarif)
          echo "CodeQL findings: ${count}"
          if [ "${count:-0}" -gt 0 ]; then
            jq -r '.runs[]?.results[]? | "\(.ruleId // "rule"): \(.locations[0].physicalLocation.artifactLocation.uri // "?"):\(.locations[0].physicalLocation.region.startLine // 0)"' codeql-results/*.sarif
            exit 1
          fi
