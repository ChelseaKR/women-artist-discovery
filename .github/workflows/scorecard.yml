name: scorecard

# SEC-36/37/38, CICD-03/21: OpenSSF Scorecard — publishes results to the
# repository's code-scanning tab and (once branch-protection is applied live,
# see docs/audits/branch-ruleset.json) can be made a required check.

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write  # publish results to the OpenSSF Scorecard public dataset
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
