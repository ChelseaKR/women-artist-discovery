name: scorecard

# SEC-36/37/38, CICD-03/21: OpenSSF Scorecard — publishes a results artifact
# (once branch-protection is applied live, see docs/audits/branch-ruleset.json,
# this can be made a required check). Upstream only officially supports
# push/schedule triggers on the default branch (pull_request is documented as
# "experimental"), so — matching this repo's original design — this runs on
# push to main plus a weekly schedule rather than per-PR.

on:
  push:
    branches: [main]
  schedule:
    - cron: "31 5 * * 1"  # weekly, Monday
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: scorecard-${{ github.ref }}
  cancel-in-progress: false

jobs:
  analysis:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      # Recommended reads for private repos so Scorecard's GraphQL checks
      # (e.g. ListCommits) don't 403 with the default token — see
      # https://github.com/ossf/scorecard-action#additional-permissions-for-private-repositories
      issues: read
      pull-requests: read
      checks: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # This is a private repo — publish_results would push the score to
          # the public OpenSSF dataset/badge, which isn't appropriate here.
          publish_results: false

      - name: Upload SARIF results
        # Code scanning/GHAS isn't purchasable for a private repo on this
        # account tier, so this always fails here; the results artifact below
        # is the real deliverable. Best-effort only.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a  # v4.36.3
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard results artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 5
