name: mutation

# Mutation testing over the safety-critical modules (CQ-47): the no-inference
# invariant in pipeline/identity.py and the boost-only/never-penalise invariant
# in recommender/rerank.py are exactly the code where a silently-weakened test
# suite would matter most. scripts/mutation-gate.sh fails the job if fewer than
# 70% of generated mutants are killed by the full unit suite, per module.
#
# Cadence: the remediation backlog suggested nightly; this runs WEEKLY (+ on
# demand) instead, matching the repo's lean-Actions posture (CI-CD-STANDARD
# §11 — the compatibility matrix made the same trade in ci.yml). Mutation
# score drifts with code changes, not with time, so weekly + manual dispatch
# after safety-core changes covers the intent at a seventh of the spend.

on:
  schedule:
    - cron: "23 6 * * 3"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: "3.13"
          enable-cache: true

      # The gate's test-command runs the project's own .venv pytest (pinned via
      # uv.lock); cosmic-ray itself is version-pinned inside the gate script
      # (same convention as pa11y in ci.yml) and runs --no-project.
      - name: Install project (dev group, pinned via uv.lock)
        run: uv sync --frozen --group dev --extra app

      - name: make mutation
        run: make mutation
