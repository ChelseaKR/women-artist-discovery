name: ci

# Mirrors QUALITY-AND-METRICS-STANDARD §"enforcement pipeline". Every stage is
# blocking; a merge to main requires this workflow green (branch protection, no
# admin bypass). `make verify` runs the same stages locally.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.9"

      - name: Set up Node (for the pa11y/axe a11y runner)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Install project (dev + app extras)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev,app]"
          npm install -g pa11y

      # 1. format + lint (ruff, incl. bandit SAST subset)
      - name: Lint
        run: make lint PYTHON=python

      # 2. strict type-check
      - name: Type-check
        run: make typecheck PYTHON=python

      # 3. unit + integration tests + coverage gate (>=85%)
      - name: Tests
        run: make test PYTHON=python

      # 4a. dependency vulnerability scan
      # Waived advisory IDs MUST stay byte-identical to the Makefile `AUDIT_IGNORES`
      # block; each is justified + tracked in docs/audits/vex.json + residual-risk.md.
      # RR-1: pip tar-extraction (build-time tooling). RR-4: every other ID's first
      # fixed release requires Python >=3.10 (3.9 is EOL), so no fix installs on the
      # 3.9 floor — remediated by the Python 3.10+ migration flagged in ROADMAP.md.
      - name: Dependency audit
        run: |
          python -m pip_audit --skip-editable \
            --ignore-vuln GHSA-4xh5-x5gv-qwph \
            --ignore-vuln GHSA-w853-jp5j-5j7f \
            --ignore-vuln GHSA-qmgc-5h2g-mvrw \
            --ignore-vuln GHSA-6v7p-g79w-8964 \
            --ignore-vuln PYSEC-2026-165 \
            --ignore-vuln GHSA-cfh3-3jmp-rvhc \
            --ignore-vuln GHSA-whj4-6x5x-4v2j \
            --ignore-vuln GHSA-5xmw-vc9v-4wf2 \
            --ignore-vuln GHSA-r73j-pqj5-w3x7 \
            --ignore-vuln GHSA-pwv6-vv43-88gr \
            --ignore-vuln PYSEC-2026-196 \
            --ignore-vuln GHSA-58qw-9mgm-455v \
            --ignore-vuln GHSA-jp4c-xjxw-mgf9 \
            --ignore-vuln PYSEC-2026-113 \
            --ignore-vuln GHSA-6w46-j5rx-g56g \
            --ignore-vuln GHSA-gc5v-m9x4-r6x2 \
            --ignore-vuln PYSEC-2026-212 \
            --ignore-vuln GHSA-7p48-42j8-8846 \
            --ignore-vuln PYSEC-2026-142 \
            --ignore-vuln PYSEC-2026-141

      # 4b. secret scan (dedicated, merge-blocking)
      - name: Secret scan
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 5. accessibility — zero axe violations on the rendered dashboard
      - name: Accessibility
        run: make a11y PYTHON=python

      # 7. responsible-tech: offline eval must beat the popularity baseline
      - name: Eval
        run: make eval PYTHON=python

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: audit-artifacts
          path: docs/audits/
