name: ci

# Mirrors QUALITY-AND-METRICS-STANDARD §"enforcement pipeline". Every stage is
# blocking; a merge to main requires this workflow green (branch protection, no
# admin bypass — see docs/audits/branch-ruleset.json for the target ruleset).
# `make verify` runs the exact same stages locally — CI just invokes that one
# target instead of re-listing its steps, so the two cannot drift (CICD-27).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Python 3.9 dropped (EOL 2025-10-31). Floor is now >=3.10.
        python-version: ${{ github.event_name == 'pull_request' && fromJSON('["3.12"]') || fromJSON('["3.10", "3.11", "3.12", "3.13"]') }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      # Installs from uv.lock (CQ-09/SEC-13): `--frozen` never re-resolves, so a
      # pyproject.toml/uv.lock drift fails this step instead of silently installing
      # something the lockfile doesn't actually pin.
      - name: Set up uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3  # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Set up Node (for the pa11y/axe a11y runner)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: "20"

      - name: Install project (dev + app groups, pinned via uv.lock)
        run: |
          uv sync --frozen --group dev --extra app
          npm install -g pa11y@9.1.1  # pinned (zizmor adhoc-packages: was unpinned)

      # The full local gate set — lint, typecheck, test+coverage, security
      # (pip-audit + secret-scan.sh), a11y (axe=0), eval (beats popularity
      # baseline), i18n (N/A declaration gate) — in the order Makefile defines.
      # `uv sync` above populates `.venv` at the repo root, which is exactly the
      # Makefile's default `PYTHON ?= .venv/bin/python` — no override needed, so
      # local `make verify` and CI's `make verify` are the literal same command.
      - name: make verify
        run: make verify

      # Dedicated, annotating secret-scan layer (kept alongside `make security`'s
      # scripts/secret-scan.sh, which falls back to a grep heuristic when the
      # gitleaks binary isn't installed locally — this is the real gitleaks scan
      # with PR file annotations).
      - name: Secret scan (gitleaks, annotated)
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: audit-artifacts
          path: docs/audits/
